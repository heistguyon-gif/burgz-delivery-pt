  // ── UTM Propagation ──
  (function(){
    var KEYS = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','fbclid'];
    var stored = {};
    var qs = new URLSearchParams(location.search);
    KEYS.forEach(function(k){
      var v = qs.get(k);
      if (v){ stored[k]=v; localStorage.setItem('bz_'+k,v); }
      else { var ls=localStorage.getItem('bz_'+k); if(ls) stored[k]=ls; }
    });
    window._bzUtms = stored;
    window._bzUtmKeys = KEYS;
  })();

  function buildLinkWithUtms(baseUrl){
    var KEYS = window._bzUtmKeys || [];
    var stored = window._bzUtms || {};
    var sep = baseUrl.indexOf('?') !== -1 ? '&' : '?';
    var extra = '';
    KEYS.forEach(function(k){
      if(stored[k]){ extra += sep + k + '=' + encodeURIComponent(stored[k]); sep='&'; }
    });
    return baseUrl + extra;
  }

  // ── Render produto ──

    for (var i = 0; i < PRODUTOS.length; i++){
      if (PRODUTOS[i].id === id){ produto = PRODUTOS[i]; break; }
    }

    var page = document.getElementById('bz-page');

    if (!produto){

        '<p>Produto não encontrado.</p>' +
        '<a href="index.html">← Ver todos os combos</a>' +

    currentProduto = produto;
    document.title = 'BURGZ Delivery — ' + produto.nome;
    document.getElementById('topbar-title').textContent = produto.nome;

    // Extras HTML
    var extrasHtml = EXTRAS.map(function(extra, i){

        '</label>' +
        '<span class="bz-extra-price">Grátis no 1.º pedido</span>' +

      '<div class="bz-section-card">' +
        '<div class="bz-extras-title">Extras</div>' +
        '<div class="bz-extras-subtitle">Selecione os que desejar — todos grátis no 1.º pedido</div>' +
        extrasHtml +
      '</div>' +

      '<div class="bz-section-card">' +
        '<label class="bz-obs-label" for="obs-input">Adicionar algum detalhe?</label>' +
        '<textarea id="obs-input" class="bz-obs-input" rows="3" maxlength="140" placeholder="Escreva o detalhe aqui..." oninput="updateObsCount()"></textarea>' +
        '<div class="bz-obs-count"><span id="obs-count">0</span>/140</div>' +
      '</div>';

    // Mostrar CTA
    document.getElementById('bz-cta-bar').style.display = 'flex';

    // Tracking ViewContent
    if (typeof fbq !== 'undefined'){
      fbq('track', 'ViewContent', {
        content_name: produto.nome,
        content_ids: [produto.id],
        content_type: 'product',
        currency: 'EUR'
      });
    }

  function toggleExtra(i){
    var cb = document.getElementById('extra-'+i);
    if (cb) cb.checked = !cb.checked;
  }

  function updateObsCount(){
    var inp = document.getElementById('obs-input');
    var cnt = document.getElementById('obs-count');
    if (inp && cnt) cnt.textContent = inp.value.length;
  }

  // ── Finalizar pedido ──
  function finalizarPedido(){
    if (!currentProduto) return;

    Swal.fire({
      title: 'Deseja que entreguemos agora?',
      showDenyButton: true,
      confirmButtonText: 'Sim, por favor! 🚀',
      confirmButtonColor: '#15803d',
      denyButtonText: 'Não, quero agendar a entrega',
      denyButtonColor: '#6b7280',
      allowOutsideClick: false
    }).then(function(result){
      if (result.isConfirmed){
        // Entrega imediata
        trackAndRedirect();
      } else if (result.isDenied){
        // Agendar entrega
        agendarEntrega();
      }
    });
  }

  function agendarEntrega(){
    var now = new Date();
    // mínimo: 30 minutos a partir de agora
    now.setMinutes(now.getMinutes() + 30);
    var minVal = now.toISOString().slice(0,16);

    Swal.fire({
      title: '📅 Agendar entrega',
      html:
        '<p style="font-size:14px;color:#4b5563;margin-bottom:12px">Selecione a data e hora desejadas:</p>' +
        '<input type="datetime-local" id="swal-dt" class="swal2-input" min="'+minVal+'" style="font-size:15px">',
      confirmButtonText: 'Confirmar agendamento',
      confirmButtonColor: '#15803d',
      showCancelButton: true,
      cancelButtonText: 'Cancelar',
      cancelButtonColor: '#9ca3af',
      allowOutsideClick: false,
      didOpen: function(){
        var dt = document.getElementById('swal-dt');
        dt.min = minVal;
        dt.value = minVal;
      },
      preConfirm: function(){
        var v = document.getElementById('swal-dt').value;
        if (!v){
          Swal.showValidationMessage('Selecione uma data e hora para a entrega.');
          return false;
        }
        var selected = new Date(v);
        var minimum = new Date(minVal);
        if (selected < minimum){
          Swal.showValidationMessage('Selecione uma hora com pelo menos 30 minutos de antecedência.');
          return false;
        }
        return v;
      }
    }).then(function(result){
      if (result.isConfirmed && result.value){
        var dt = new Date(result.value);
        var formatted = dt.toLocaleDateString('pt-PT', {
          day: '2-digit', month: '2-digit', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
        Swal.fire({
          icon: 'success',
          title: 'Entrega agendada!',
          html: '<p style="font-size:14px">O seu pedido será entregue a <b>'+formatted+'</b>.</p>',
          confirmButtonText: 'Continuar para o pagamento',
          confirmButtonColor: '#15803d'
        }).then(function(){
          trackAndRedirect();
        });
      }
    });
  }

  function trackAndRedirect(){
    if (typeof fbq !== 'undefined'){
      fbq('track', 'InitiateCheckout', {
        content_name: currentProduto.nome,
        content_ids: [currentProduto.id],
        content_type: 'product',
        currency: 'EUR'
      });
    }
    var url = buildLinkWithUtms(currentProduto.link);
    setTimeout(function(){ window.location.href = url; }, 300);
  }

  // ── Init ──
  renderPage();
  </script>

</body>
