<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho - Zé Delivery</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: #f7f7f7; color: #1A1A1A;
           animation: slideInRight .28s cubic-bezier(.25,.46,.45,.94) both; }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: .6; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    /* ── Header ── */
    .c-header {
      position: sticky; top: 0; z-index: 100;
      background: #ffcc01;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px;
    }
    .c-header-btn {
      background: none; border: none; cursor: pointer;
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: #1A1A1A; transition: background .2s;
    }
    .c-header-btn:hover { background: rgba(0,0,0,.1); }
    .c-header-title { font-weight: 700; font-size: 16px; }
    .c-header-count { font-size: 13px; font-weight: 600; color: #1A1A1A; opacity: .7; }

    /* ── Vazio ── */
    .c-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 24px; text-align: center;
    }
    .c-empty i { font-size: 64px; color: #ddd; margin-bottom: 20px; }
    .c-empty h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: #555; }
    .c-empty p  { font-size: 14px; color: #aaa; margin-bottom: 24px; }
    .c-empty-btn {
      background: #ffcc01; color: #1A1A1A; border: none; border-radius: 24px;
      padding: 13px 32px; font-family: 'Poppins', sans-serif; font-weight: 700;
      font-size: 15px; cursor: pointer; transition: background .2s;
    }
    .c-empty-btn:hover { background: #f0c000; }

    /* ── Lista de itens ── */
    .c-list { padding: 12px 12px 0; }

    .c-item {
      background: #fff; border-radius: 14px; padding: 14px 14px;
      display: flex; align-items: flex-start; gap: 12px;
      margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }
    .c-item-img {
      width: 62px; height: 62px; border-radius: 10px; object-fit: cover;
      flex-shrink: 0;
    }
    .c-item-body { flex: 1; min-width: 0; }
    .c-item-name { font-size: 14px; font-weight: 700; line-height: 1.3; margin-bottom: 3px; }
    .c-item-obs  { font-size: 12px; color: #999; margin-bottom: 8px; font-style: italic; }
    .c-item-row  { display: flex; align-items: center; justify-content: space-between; }
    .c-item-price { font-size: 15px; font-weight: 700; color: #077c22; }
    .c-item-qty {
      display: flex; align-items: center; gap: 8px;
      background: #f5f5f5; border-radius: 20px; padding: 5px 12px;
    }
    .c-qty-btn {
      background: none; border: none; cursor: pointer;
      font-size: 18px; font-weight: 700; color: #1A1A1A;
      width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; transition: background .15s;
    }
    .c-qty-btn:hover:not(:disabled) { background: #e0e0e0; }
    .c-qty-btn:disabled { opacity: .3; cursor: default; }
    .c-qty-num { font-size: 14px; font-weight: 700; min-width: 18px; text-align: center; }
    .c-item-del {
      background: none; border: none; cursor: pointer;
      color: #ccc; font-size: 16px; padding: 4px 4px 4px 8px;
      flex-shrink: 0; transition: color .2s;
    }
    .c-item-del:hover { color: #e53935; }

    /* ── Resumo ── */
    .c-summary {
      background: #fff; border-radius: 14px; margin: 10px 12px;
      padding: 16px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }
    .c-summary-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: #555; text-transform: uppercase; letter-spacing: .5px; }
    .c-summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
    .c-summary-row.total { font-weight: 700; font-size: 17px; border-top: 1px solid #eee; padding-top: 12px; margin-top: 4px; }
    .c-summary-free { color: #077c22; font-weight: 600; }

    /* ── Bottom ── */
    .c-bottom {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid #eee;
      padding: 12px 16px; z-index: 200;
    }
    .c-checkout-btn {
      width: 100%; background: #ffcc01; color: #1A1A1A; border: none;
      border-radius: 24px; padding: 15px 18px;
      font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: space-between;
      transition: background .2s;
    }
    .c-checkout-btn:hover { background: #f0c000; }
    .c-checkout-btn:disabled { opacity: .4; cursor: default; }
    .c-spacer { height: 80px; }
  </style>
</head>
<body>

  <div class="c-header">
    <button class="c-header-btn" onclick="history.back()"><i class="fa fa-chevron-left"></i></button>
    <span class="c-header-title">Carrinho</span>
    <span class="c-header-count" id="c-count"></span>
  </div>

  <div id="c-content"></div>

  <div class="c-spacer"></div>

  <div class="c-bottom">
    <button class="c-checkout-btn" id="c-btn-checkout" onclick="window.location.href='checkout.html'" disabled>
      <span>Finalizar Pedido</span>
      <span id="c-btn-total">R$ 0,00</span>
    </button>
  </div>

  <script src="js/produtos.js"></script>
  <script src="js/carrinho-data.js"></script>
  <script>
    function fmt(v) { return 'R$ ' + v.toFixed(2).replace('.', ','); }

    /* ── Renderiza o carrinho ── */
    function renderCart() {
      var c = CarrinhoData.get();
      var items = c.items;
      var total = CarrinhoData.totalValor();
      var count = CarrinhoData.totalItens();
      var el    = document.getElementById('c-content');

      document.getElementById('c-count').textContent = count > 0 ? count + (count === 1 ? ' item' : ' itens') : '';

      var btn = document.getElementById('c-btn-checkout');
      document.getElementById('c-btn-total').textContent = fmt(total);
      btn.disabled = items.length === 0;

      if (items.length === 0) {
        el.innerHTML =
          '<div class="c-empty">'
          + '<i class="fa fa-shopping-cart"></i>'
          + '<h2>Seu carrinho está vazio</h2>'
          + '<p>Adicione produtos para continuar</p>'
          + '<button class="c-empty-btn" onclick="window.location.href=\'index.html\'">Ver Produtos</button>'
          + '</div>';
        return;
      }

      var html = '<div class="c-list">';
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        html += '<div class="c-item">'
             +   '<img class="c-item-img" src="' + item.img + '" alt="' + item.nome + '">'
             +   '<div class="c-item-body">'
             +     '<div class="c-item-name">' + item.nome + '</div>'
             +     (item.obs ? '<div class="c-item-obs">' + item.obs + '</div>' : '')
             +     '<div class="c-item-row">'
             +       '<span class="c-item-price">' + fmt(item.preco * item.quantidade) + '</span>'
             +       '<div class="c-item-qty">'
             +         '<button class="c-qty-btn" ' + (item.quantidade <= 1 ? 'disabled' : '') + ' onclick="changeItemQty(' + i + ',-1)">−</button>'
             +         '<span class="c-qty-num">' + item.quantidade + '</span>'
             +         '<button class="c-qty-btn" onclick="changeItemQty(' + i + ',1)">+</button>'
             +       '</div>'
             +     '</div>'
             +   '</div>'
             +   '<button class="c-item-del" onclick="removeItem(' + i + ')"><i class="fa fa-times"></i></button>'
             + '</div>';
      }
      html += '</div>';

      html += '<div class="c-summary">'
           +   '<div class="c-summary-title">Resumo</div>'
           +   '<div class="c-summary-row"><span>Subtotal</span><span>' + fmt(total) + '</span></div>'
           +   '<div class="c-summary-row"><span>Entrega</span><span class="c-summary-free">Grátis</span></div>'
           +   '<div class="c-summary-row total"><span>Total</span><span>' + fmt(total) + '</span></div>'
           + '</div>';

      el.innerHTML = html;
    }

    function changeItemQty(index, delta) {
      var c = CarrinhoData.get();
      var newQty = c.items[index].quantidade + delta;
      CarrinhoData.setQty(index, newQty);
      renderCart();
    }

    function removeItem(index) {
      CarrinhoData.remover(index);
      renderCart();
    }

    renderCart();
  </script>
</body>
</html>
